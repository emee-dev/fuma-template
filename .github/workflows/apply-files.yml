name: Apply Incoming Files

on:
  repository_dispatch:
    types: [apply-files]

jobs:
  apply-files:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for force push

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Write webhook payload to file
        run: echo '${{ toJson(github.event.client_payload) }}' > tenant.json

      - name: Install deps
        run: npm install

      - name: Run file writer script
        run: bun run scripts/apply-files.ts

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Apply incoming file updates" || echo "No changes to commit"

      - name: Force push to branch
        run: |
          git push origin HEAD:main --force
